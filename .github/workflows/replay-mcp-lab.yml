name: Replay MCP Lab

on:
  push:
    branches: [main, changesets-main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Build and normal Playwright checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - run: npm run validate:manifests

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-normal-checks
          path: |
            replay-mcp-lab-vite/playwright-report
            replay-mcp-lab-vite/test-results
            replay-mcp-lab-next/playwright-report
            replay-mcp-lab-next/test-results
            replay-mcp-lab-tanstack-start/playwright-report
            replay-mcp-lab-tanstack-start/test-results
          if-no-files-found: ignore

  replay-recordings:
    name: Replay recordings (${{ matrix.framework }})
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: vite
            workspace: "@replayio/mcp-lab-vite"
            package-dir: replay-mcp-lab-vite
          - framework: next
            workspace: "@replayio/mcp-lab-next"
            package-dir: replay-mcp-lab-next
          - framework: tanstack-start
            workspace: "@replayio/mcp-lab-tanstack-start"
            package-dir: replay-mcp-lab-tanstack-start

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Require Replay API key
        env:
          REPLAY_API_KEY: ${{ secrets.SANDBOX_CI_REPLAY_API_KEY || secrets.REPLAY_API_KEY }}
        run: |
          if [ -z "$REPLAY_API_KEY" ]; then
            echo "Configure SANDBOX_CI_REPLAY_API_KEY or REPLAY_API_KEY for Replay uploads."
            exit 1
          fi

      - name: Install Playwright Chromium dependencies
        run: npx playwright install --with-deps chromium

      - name: Install Replay browser
        run: npx replayio install

      - name: Show Replay runtime info
        run: npx replayio info

      - name: Run Replay Playwright recordings
        env:
          REPLAY_API_KEY: ${{ secrets.SANDBOX_CI_REPLAY_API_KEY || secrets.REPLAY_API_KEY }}
          REPLAY_RUN_TITLE: replay-mcp-lab-${{ matrix.framework }}#${{ github.run_number }}.${{ github.run_attempt }}
          REPLAY_UPLOAD: "1"
          RECORD_ALL_CONTENT: "1"
          RECORD_REPLAY_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.framework }}
          RECORD_REPLAY_VERBOSE: "1"
        run: npm run record:all -w ${{ matrix.workspace }}

      - name: Validate manifest coverage
        run: npm run validate:manifest -w ${{ matrix.workspace }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-replay-${{ matrix.framework }}
          path: |
            ${{ matrix.package-dir }}/playwright-report
            ${{ matrix.package-dir }}/test-results
          if-no-files-found: ignore
